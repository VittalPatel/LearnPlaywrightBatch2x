version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hms_db
      POSTGRES_USER: hms_user
      POSTGRES_PASSWORD: hms_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      PORT: 5000
      DATABASE_URL: postgres://hms_user:hms_password@postgres:5432/hms_db
    depends_on:
      - postgres
    ports:
      - '5000:5000'

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - server
    ports:
      - '3000:80'

volumes:
  pgdata:
